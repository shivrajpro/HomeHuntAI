<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="HomeHunt AI — Nestor, your AI home decision partner. Find the home that fits your life."
    />
    <meta name="theme-color" content="#fcfcfd" />
    <title>HomeHunt AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Prevent a flash of the wrong theme before React/next-themes mounts.
      try {
        var stored = localStorage.getItem('theme')
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var dark = stored ? stored === 'dark' : false // default light
        if (stored === 'system') dark = systemDark
        document.documentElement.classList.toggle('dark', dark)
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
