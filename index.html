<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%8F%A1%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="HomeHunt AI — Nestor, your AI home decision partner. Find the home that fits your life."
    />
    <meta name="theme-color" content="#0e0e12" />
    <title>HomeHunt AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap"
      rel="stylesheet"
    />

    <script>
      // Prevent a flash of the wrong theme before React/next-themes mounts.
      try {
        var stored = localStorage.getItem('theme')
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var dark = stored ? stored === 'dark' : true // default dark
        if (stored === 'system') dark = systemDark
        document.documentElement.classList.toggle('dark', dark)
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
